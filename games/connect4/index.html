<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 - UGames</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <a href="../../index.html" class="back-btn">&larr; Kembali ke Portal</a>
            <h1>Connect <span>4</span></h1>
        </header>

        <div class="status-board">
            <h2 id="turnText">Giliran: Pemain 1 (Merah)</h2>
            <button id="restartBtn">Main Lagi</button>
        </div>

        <div class="board" id="board">
            <!-- 7 columns x 6 rows will be generated by JS -->
        </div>

        <div id="gameOverOverlay" class="overlay hidden">
            <h2 id="endMessage">Pemain 1 Menang!</h2>
            <button id="playAgainBtn">Coba Lagi</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
