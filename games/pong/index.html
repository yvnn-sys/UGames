<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pong - UGames</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <a href="../../index.html" class="back-btn">&larr; Kembali</a>
            <h1>Neon <span>Pong</span></h1>
        </header>

        <div class="score-board">
            <div id="player-score">0</div>
            <div class="divider">:</div>
            <div id="ai-score">0</div>
        </div>

        <canvas id="pong-canvas" width="800" height="500"></canvas>
        
        <div class="game-over" id="game-over" style="display: none;">
            <h2 id="final-message">Game Over!</h2>
            <button id="restart-btn" onclick="restartGame()">Main Lagi</button>
        </div>
        
        <div class="controls-info">
            <p>Gerakkan mouse Anda ke atas dan ke bawah untuk mengontrol paddle kiri.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
